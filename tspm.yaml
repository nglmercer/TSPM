# '/examples/applications/server.ts'
processes:
  - name: example-app
    script: bun
    args:
      - run
      - examples/applications/server.ts
    env:
      NODE_ENV: production
      PORT: "0"
    autorestart: true
    stdout: logs/example-app.log

defaults:
  autorestart: true
  maxRestarts: 10

logDir: logs
